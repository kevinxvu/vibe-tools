<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeTools</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: 'var(--background)',
              foreground: 'var(--foreground)',
              primary: {
                DEFAULT: '#6366f1', // Indigo 500
                foreground: '#ffffff',
              },
              secondary: {
                DEFAULT: '#64748b', // Slate 500
                foreground: '#ffffff',
              },
              muted: {
                DEFAULT: '#f1f5f9', // Slate 100
                foreground: '#64748b', // Slate 500
              },
              card: {
                DEFAULT: '#ffffff',
                foreground: '#0f172a', // Slate 900
              },
            },
            typography: (theme) => ({
              DEFAULT: {
                css: {
                  color: theme('colors.slate.700'),
                  a: {
                    color: theme('colors.indigo.600'),
                    '&:hover': {
                      color: theme('colors.indigo.700'),
                    },
                  },
                  code: {
                    color: theme('colors.indigo.600'),
                    backgroundColor: theme('colors.slate.100'),
                    padding: '2px 4px',
                    borderRadius: '4px',
                    fontWeight: '600',
                  },
                  'code::before': { content: '""' },
                  'code::after': { content: '""' },
                },
              },
              dark: {
                css: {
                  color: theme('colors.slate.300'),
                  a: {
                    color: theme('colors.indigo.400'),
                    '&:hover': {
                      color: theme('colors.indigo.300'),
                    },
                  },
                  h1: { color: theme('colors.white') },
                  h2: { color: theme('colors.white') },
                  h3: { color: theme('colors.white') },
                  strong: { color: theme('colors.white') },
                  code: {
                    color: theme('colors.indigo.400'),
                    backgroundColor: theme('colors.slate.800'),
                  },
                },
              },
            }),
          },
        },
        plugins: [],
      }
    </script>
    <style>
      /* Custom Scrollbar for a dev-tool feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      
      /* Markdown Styles */
      .markdown-body h1 { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; margin-top: 0; }
      .markdown-body h2 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; margin-top: 1em; }
      .markdown-body h3 { font-size: 1.25em; font-weight: bold; margin-bottom: 0.5em; margin-top: 1em; }
      .markdown-body p { margin-bottom: 1em; line-height: 1.6; }
      .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
      .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
      .markdown-body pre { background: #f1f5f9; padding: 1em; border-radius: 0.5em; overflow-x: auto; margin-bottom: 1em; }
      .dark .markdown-body pre { background: #1e293b; }
      .markdown-body blockquote { border-left: 4px solid #cbd5e1; padding-left: 1em; margin-bottom: 1em; font-style: italic; }
      .dark .markdown-body blockquote { border-left-color: #475569; }
    </style>
</head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 transition-colors duration-300 antialiased selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
